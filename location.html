<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Precision Location Finder</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #output { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px; display: none; }
        .error { color: #d32f2f; background: #ffebee; }
        .map-link { display: inline-block; margin-top: 10px; padding: 8px 12px; background: #1a73e8; color: white; text-decoration: none; border-radius: 4px; }
        iframe { width: 100%; height: 300px; border: 0; margin-top: 15px; border-radius: 8px; }
    </style>
</head>
<body>

    <h2>High-Precision Location Finder</h2>
    <button id="locateBtn">Get Precise Location</button>
    
    <div id="output"></div>

    <script>
        const button = document.getElementById('locateBtn');
        const output = document.getElementById('output');

        button.addEventListener('click', () => {
            if (!navigator.geolocation) {
                showOutput('Geolocation is not supported by your browser.', true);
                return;
            }

            showOutput('Acquiring satellite/Wi-Fi lock… Please wait (this can take a few seconds).');

            // Using watchPosition instead of getCurrentPosition allows the browser 
            // to update us as the accuracy improves over a few seconds.
            const watchId = navigator.geolocation.watchPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const accuracy = Math.round(position.coords.accuracy);

                    const mapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;
                    const embedUrl = `https://maps.google.com/maps?q=${lat},${lon}&z=19&output=embed`; // &z=19 forces high zoom

                    showOutput(`
                        <strong>Latitude:</strong> ${lat} <br>
                        <strong>Longitude:</strong> ${lon} <br>
                        <em>Current Accuracy: within ${accuracy} meters</em><br>
                        <small style="color: #666;">(If accuracy is high, we will stop watching automatically)</small><br>
                        <a href="${mapsUrl}" target="_blank" class="map-link">Open in Google Maps ↗</a>
                        <br>
                        <iframe src="${embedUrl}" allowfullscreen="" loading="lazy"></iframe>
                    `);

                    // If accuracy drops below 20 meters, we consider it a solid GPS lock and stop watching to save battery
                    if (accuracy <= 20) {
                        navigator.geolocation.clearWatch(watchId);
                    }
                }, 
                (error) => {
                    let errorMessage = 'An error occurred while getting location.';
                    if (error.code === error.PERMISSION_DENIED) errorMessage = 'Permission denied.';
                    if (error.code === error.POSITION_UNAVAILABLE) errorMessage = 'Location unavailable. Ensure device GPS/Location Services are turned on.';
                    if (error.code === error.TIMEOUT) errorMessage = 'Location request timed out. Try moving near a window or outdoors.';
                    showOutput(errorMessage, true);
                    navigator.geolocation.clearWatch(watchId);
                }, 
                {
                    enableHighAccuracy: true, // Forces usage of GPS/hardware sensors
                    timeout: 20000,           // Gives it 20 seconds to establish a lock
                    maximumAge: 0             // Rejects old cached location data completely
                }
            );
        });

        function showOutput(message, isError = false) {
            output.style.display = 'block';
            output.innerHTML = message;
            if (isError) {
                output.classList.add('error');
            } else {
                output.classList.remove('error');
            }
        }
    </script>
</body>
</html>
