<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triangulation Map</title>
    
    <!-- Load Leaflet.js CSS and JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #output { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px; display: none; }
        .error { color: #d32f2f; background: #ffebee; }
        
        /* Map container must have a defined height to render */
        #map { width: 100%; height: 400px; margin-top: 15px; border-radius: 8px; display: none; z-index: 1; }
    </style>
</head>
<body>

    <h2>Multi-Sample Location Triangulation</h2>
    <p>This will measure your location 5 times and map the overlap.</p>
    <button id="locateBtn">Start 5-Point Measurement</button>
    
    <div id="output"></div>
    <div id="map"></div>

    <script>
        const button = document.getElementById('locateBtn');
        const output = document.getElementById('output');
        const mapContainer = document.getElementById('map');
        
        let samples = [];
        let mapInstance = null;
        let watchId = null; // Variable to hold the continuous stream ID

        button.addEventListener('click', () => {
            if (!navigator.geolocation) {
                showOutput('Geolocation is not supported by your browser.', true);
                return;
            }

            // Reset UI for new measurements
            samples = [];
            button.disabled = true;
            mapContainer.style.display = 'none';
            if (mapInstance) {
                mapInstance.remove();
                mapInstance = null;
            }

            showOutput('Opening location stream... Please allow the prompt once.');

            // Start a continuous stream. This guarantees only ONE prompt.
            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    // Check if we already have 5 samples to prevent over-collecting
                    if (samples.length >= 5) return;

                    samples.push({
                        lat: position.coords.latitude,
                        lon: position.coords.longitude,
                        accuracy: position.coords.accuracy
                    });

                    showOutput(`Acquiring measurement ${samples.length} of 5...`);

                    // Once we hit 5 samples, shut down the stream and draw the map
                    if (samples.length === 5) {
                        navigator.geolocation.clearWatch(watchId); // Stops the GPS tracking
                        showOutput('5 samples collected. Rendering map...');
                        renderMap();
                        button.disabled = false;
                    }
                },
                (error) => {
                    let errorMessage = 'An unknown error occurred.';
                    if (error.code === error.PERMISSION_DENIED) errorMessage = 'Permission denied.';
                    if (error.code === error.POSITION_UNAVAILABLE) errorMessage = 'Location unavailable.';
                    if (error.code === error.TIMEOUT) errorMessage = 'Location request timed out.';
                    showOutput(errorMessage, true);
                    
                    if (watchId) navigator.geolocation.clearWatch(watchId);
                    button.disabled = false;
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        });

        // Initialize Leaflet Map and draw circles
        function renderMap() {
            mapContainer.style.display = 'block';

            const centerLat = samples[0].lat;
            const centerLon = samples[0].lon;

            mapInstance = L.map('map').setView([centerLat, centerLon], 16);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap contributors'
            }).addTo(mapInstance);

            samples.forEach((sample) => {
                L.circle([sample.lat, sample.lon], {
                    color: '#1a73e8',
                    fillColor: '#1a73e8',
                    fillOpacity: 0.2, 
                    radius: sample.accuracy 
                }).addTo(mapInstance);
                
                L.circle([sample.lat, sample.lon], {
                    color: 'red',
                    fillColor: 'red',
                    fillOpacity: 1,
                    radius: 1
                }).addTo(mapInstance);
            });

            showOutput(`
                <strong>Analysis Complete</strong><br>
                Look for the darkest blue area on the map. This represents the intersection where all 5 accuracy radii overlap. <br>
                <small>The red dots represent the center point of each individual measurement.</small>
            `);
        }

        function showOutput(message, isError = false) {
            output.style.display = 'block';
            output.innerHTML = message;
            if (isError) {
                output.classList.add('error');
            } else {
                output.classList.remove('error');
            }
        }
    </script>
</body>
</html>
